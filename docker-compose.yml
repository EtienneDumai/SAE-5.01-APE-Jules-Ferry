
services:
  postgres:
    image: postgres:16
    container_name: ape_postgres
    restart: always
    environment:
      POSTGRES_DB: ape_db
      POSTGRES_USER: ape_user
      POSTGRES_PASSWORD: ape_password
    ports:
      - "5432:5432"
    volumes:
      - ./db-data:/var/lib/postgresql/data

  laravel:
    build: ./backend
    container_name: ape_laravel
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ape_db
      DB_USERNAME: ape_user
      DB_PASSWORD: ape_password
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
      # évite d’écraser vendor par le host si tu ne l’as pas en local
      - laravel_vendor:/var/www/vendor
    command: >
      sh -c "
      composer install &&
      php artisan migrate:fresh --seed &&
      (while true; do php artisan schedule:run >> /dev/null 2>&1; sleep 60; done) &
      php artisan serve --host=0.0.0.0 --port=8000
      "

  angular:
    build: ./frontend
    container_name: ape_angular
    restart: always
    ports:
      - "4200:4200"
    working_dir: /app
    volumes:
      - ./frontend:/app
      - angular_node_modules:/app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    command: >
      sh -c "
      if [ ! -d node_modules ] || [ ! -f node_modules/.ci_done ] || [ package-lock.json -nt node_modules/.ci_done ]; then
        npm ci && date > node_modules/.ci_done;
      fi;
      npm run start -- --host 0.0.0.0 --port 4200 --poll 2000 --hmr
      "

volumes:
  laravel_vendor:
  angular_node_modules:
