<div
  class="bg-[var(--secondary-light-green)] rounded-lg shadow overflow-hidden max-w-md mx-4"
>
  <h3
    class="text-lg font-semibold text-[var(--black-text-color)] p-4 text-center"
  >
    {{ titre }}
  </h3>

  <div class="w-full h-48">
    <img
      [src]="image_url"
      [alt]="titre"
      class="w-full h-full object-cover"
      loading="lazy"
    />
  </div>

  <div class="p-4">
    <p class="mt-2 text-sm text-[var(--black-text-color)]">{{ contenu }}</p>
    <div class="flex justify-between items-center mt-4">
      <span class="text-sm text-[var(--black-text-color)]">{{
        convertDateToString(datePublication)
      }}</span>

      <button
        [routerLink]="['/actualite', id_actualite]"
        class="bg-white px-4 py-2 rounded text-[var(--primary-blue)] border border-[var(--primary-blue)]"
      >
        Voir plus
      </button>
    </div>
  </div>
</div>
