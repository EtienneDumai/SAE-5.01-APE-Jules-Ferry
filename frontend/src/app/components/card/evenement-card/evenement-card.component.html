<div class="h-full flex flex-col rounded-2xl border border-green-600 overflow-hidden bg-[var(--secondary-light-green)] shadow-sm hover:shadow-md transition-shadow">

    <div class="p-4 flex items-center gap-4">
        
        <div class="w-12 h-12 flex-shrink-0 rounded-full bg-green-600 flex items-center justify-center text-white text-xl font-bold">
            {{ titre.charAt(0).toUpperCase() }}
        </div>

        <div class="flex flex-col flex-grow">
            <h3 class="font-bold text-gray-900 text-lg leading-tight line-clamp-1" [title]="titre">
                {{ titre }}
            </h3>
            <p class="text-sm text-gray-700">
                {{ date_evenement | date:'dd/MM/yyyy' }} · {{ heure_debut }} - {{ heure_fin }}
            </p>
        </div>

        @if(canManage) {
            <div class="flex gap-2">
                <button (click)="onEdit($event)" class="text-blue-600 hover:text-blue-800 transition-colors" title="Modifier">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                      <path stroke-linecap="round" stroke-linejoin="round" d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L10.582 16.07a4.5 4.5 0 0 1-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 0 1 1.13-1.897l8.932-8.931Zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0 1 15.75 21H5.25A2.25 2.25 0 0 1 3 18.75V8.25A2.25 2.25 0 0 1 5.25 6H10" />
                    </svg>
                </button>
                <button (click)="onDelete($event)" class="text-red-600 hover:text-red-800 transition-colors" title="Supprimer">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                      <path stroke-linecap="round" stroke-linejoin="round" d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0" />
                    </svg>
                </button>
            </div>
        }
    </div>

    <div class="h-48 w-full bg-gray-200 relative">
        @if(image_url) {
            <img [src]="image_url" [alt]="titre" class="w-full h-full object-cover" loading="lazy">
        } @else {
            <div class="w-full h-full flex items-center justify-center bg-gray-100 opacity-50">
                <svg class="w-12 h-12 text-gray-400" fill="currentColor" viewBox="0 0 24 24">
                   <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14zm-5.04-6.71l-2.75 3.54-1.96-2.36L6.5 17h11l-3.54-4.71z"/>
                </svg>
            </div>
        }
    </div>

    <div class="p-4 flex flex-col flex-grow justify-between">
        
        <p class="text-gray-700 font-medium text-sm line-clamp-3 mb-4">
            {{ description }}
        </p>

        <div class="flex justify-between items-center mt-auto">
            <div class="flex items-center gap-1 text-gray-700">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5">
                    <path fill-rule="evenodd" d="m11.54 22.351.07.04.028.016a.76.76 0 0 0 .723 0l.028-.015.071-.041a16.975 16.975 0 0 0 1.144-.742 19.58 19.58 0 0 0 2.683-2.282c1.944-1.99 3.963-4.98 3.963-8.827a8.25 8.25 0 0 0-16.5 0c0 3.846 2.02 6.837 3.963 8.827a19.58 19.58 0 0 0 2.682 2.282 16.975 16.975 0 0 0 1.145.742ZM12 13.5a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z" clip-rule="evenodd"/>
                </svg>
                <span class="text-sm">{{ lieu }}</span>
            </div>
            <button 
                [routerLink]="['/evenements', id_evenement]"
                class="bg-white text-[var(--primary-blue)] border-2 border-[var(--primary-blue)] rounded-full px-6 py-1.5 text-sm font-bold hover:bg-blue-50 transition-colors">
                Voir plus..
            </button>
        </div>
    </div>

</div>
