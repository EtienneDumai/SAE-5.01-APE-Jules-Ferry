<div class="h-full flex flex-col rounded-2xl border border-green-600 overflow-hidden bg-[var(--secondary-light-green)] shadow-sm hover:shadow-md transition-shadow">

    <div class="p-4 flex items-center gap-4">
        
        <div class="w-12 h-12 flex-shrink-0 rounded-full bg-green-600 flex items-center justify-center text-white text-xl font-bold">
            {{ titre.charAt(0).toUpperCase() }}
        </div>

        <div class="flex flex-col flex-grow">
            <h3 class="font-bold text-gray-900 text-lg leading-tight line-clamp-1" [title]="titre">
                {{ titre }}
            </h3>
            <p class="text-sm text-gray-700">
                {{ date_evenement | date:'dd/MM/yyyy' }} · {{ heure_debut }} - {{ heure_fin }}
            </p>
        </div>

        @if(canManage) {
            <div class="flex gap-2">
                <button (click)="onEdit($event)" class="text-blue-600 hover:text-blue-800 transition-colors" title="Modifier">
                    <i class="fa-regular fa-pen-to-square"></i>
                </button>
                <button (click)="onDelete($event)" class="text-red-600 hover:text-red-800 transition-colors" title="Supprimer">
                    <i class="fa-regular fa-trash-can"></i>
                </button>
            </div>
        }
    </div>

    <div class="h-48 w-full bg-gray-200 relative">
        @if(image_url) {
            <img [src]="getImageUrl(image_url)" [alt]="titre" class="w-full h-full object-cover" loading="lazy">
        } @else {
            <div class="w-full h-full flex items-center justify-center bg-gray-100 opacity-50">
                <i class="fa-solid fa-image text-gray-400" aria-hidden="true" style="font-size: 48px;"></i>
            </div>
        }
    </div>

    <div class="p-4 flex flex-col flex-grow justify-between">
        
        <p class="text-gray-700 font-medium text-sm line-clamp-3 mb-4">
            {{ description }}
        </p>

        <div class="flex flex-col gap-2">
            <div class="flex items-center gap-1 text-gray-700">
                <i class="fa-solid fa-location-dot w-5 h-5" aria-hidden="true" style="font-size: 20px;"></i>
                <span class="text-sm">{{ lieu }}</span>
            </div>
            
            <div class="flex gap-2">
                <button 
                    [routerLink]="['/evenements', id_evenement]"
                    class="flex-1 bg-white text-[var(--primary-blue)] border-2 border-[var(--primary-blue)] rounded-full px-4 py-1.5 text-sm font-bold hover:bg-blue-50 transition-colors">
                    Voir plus
                </button>
                <button 
                    [routerLink]="['/evenements', id_evenement]"
                    [queryParams]="{ openForm: 'true' }"
                    class="flex-1 bg-[var(--primary-blue)] text-white border-2 border-[var(--primary-blue)] rounded-full px-4 py-1.5 text-sm font-bold hover:bg-[var(--primary-dark-blue)] transition-colors">
                    M'inscrire
                </button>
            </div>
        </div>
    </div>

</div>
