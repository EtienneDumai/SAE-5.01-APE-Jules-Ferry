<div
  class="bg-[var(--secondary-light-green)] rounded-lg shadow overflow-hidden max-w-md mx-4"
>
  <h3
    class="text-lg font-semibold text-[var(--black-text-color)] p-4 text-center"
  >
    {{ titre }}
  </h3>

  <div class="w-full h-48">
    <img
      [src]="image_url"
      [alt]="titre"
      class="w-full h-full object-cover"
      loading="lazy"
    />
  </div>

  <div class="p-4">
    <p class="mt-2 text-sm text-[var(--black-text-color)] text-center">
      {{ description }}
    </p>
    <div class="flex justify-between items-center mt-4">
      <span class="text-sm text-[var(--black-text-color)]">{{
        date_evennement | date:'dd/MM/yyyy'
      }}</span>
      <span class="text-sm text-[var(--black-text-color)]">
        {{ heure_debut }} - {{ heure_fin }}
      </span>
    </div>
    <div class="flex justify-between items-center mt-4">
      <div class="items-center flex">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="currentColor"
          class="size-6 text-[var(--black-text-color)]"
        >
          <path
            fill-rule="evenodd"
            d="m11.54 22.351.07.04.028.016a.76.76 0 0 0 .723 0l.028-.015.071-.041a16.975 16.975 0 0 0 1.144-.742 19.58 19.58 0 0 0 2.683-2.282c1.944-1.99 3.963-4.98 3.963-8.827a8.25 8.25 0 0 0-16.5 0c0 3.846 2.02 6.837 3.963 8.827a19.58 19.58 0 0 0 2.682 2.282 16.975 16.975 0 0 0 1.145.742ZM12 13.5a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"
            clip-rule="evenodd"
          />
        </svg>
        <span class="text-sm text-[var(--black-text-color)]">{{ lieu }}</span>
      </div>
      <button
        routerLink="/evennement/{{id_evennement}}"
        class="bg-white ml-5 px-4 py-2 rounded text-[var(--primary-blue)] border border-[var(--primary-blue)]"
      >
        Voir plus
      </button>
    </div>
  </div>
</div>
