<div class="fixed inset-0 z-50 flex items-center justify-center overflow-y-auto overflow-x-hidden p-4">
    <div class="fixed inset-0 bg-gray-600 bg-opacity-50 transition-opacity" (click)="onCancel()"
        (keyup.enter)="onCancel()" tabindex="0" role="button">
    </div>
    
    <div class="relative bg-white rounded-[8px] border-[1.5px] border-[var(--border-light)] shadow-[4px_4px_0_var(--accent-orange)] p-6 w-full max-w-sm animate-fade-up z-10">
        <div class="mt-1">
            <h3 class="font-abril text-xl text-[var(--primary-green)] mb-4 text-center">{{ title }}</h3>
            
            <div class="mb-6">
                <div class="flex justify-between items-end mb-3">
                    <p class="font-josefin text-[10px] uppercase font-bold tracking-widest text-[var(--text-secondary)] m-0">Colonnes à exporter</p>
                    <div class="flex gap-2 font-dm text-[11px] text-[var(--accent-orange)] font-bold">
                        <button (click)="selectAll()" class="hover:text-[var(--primary-green)] transition-colors">Tout cocher</button>
                        <span class="text-[var(--border-light)]">|</span>
                        <button (click)="deselectAll()" class="hover:text-[var(--primary-green)] transition-colors">Tout décocher</button>
                    </div>
                </div>
                
                <div class="space-y-2 pr-1">
                    @for (col of availableColumns; track col.key) {
                        <label class="flex items-center space-x-3 cursor-pointer p-2.5 rounded-[4px] border-[1.5px] border-[var(--border-light)] bg-[var(--bg-creme)]/50 hover:bg-[var(--bg-creme)] transition-colors">
                            <input type="checkbox" [(ngModel)]="col.selected"
                                class="w-4 h-4 rounded-[3px] border-[var(--border-light)] text-[var(--accent-orange)] focus:ring-[var(--accent-orange)] focus:ring-offset-0 bg-white cursor-pointer">
                            <span class="font-dm text-sm font-medium text-[var(--primary-green)]">{{ col.label }}</span>
                        </label>
                    }
                </div>
            </div>
            
            <div class="flex items-center justify-between gap-3">
                <button (click)="onCancel()" class="flex-1 btn-secondary text-center">
                    Annuler
                </button>
                <button (click)="onConfirm()" [disabled]="!availableColumns.length" class="flex-1 btn-primary text-center disabled:opacity-50">
                    Exporter
                </button>
            </div>
        </div>
    </div>
</div>
