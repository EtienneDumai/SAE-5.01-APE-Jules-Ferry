<div class="fixed inset-0 z-50 flex items-center justify-center overflow-y-auto overflow-x-hidden p-4">
    <div class="fixed inset-0 bg-gray-600 bg-opacity-50 transition-opacity" (click)="onCancel()"
        (keyup.enter)="onCancel()" tabindex="0" role="button">
    </div>
    
    <div class="relative bg-white rounded-[8px] border-[1.5px] border-[var(--border-light)] shadow-[4px_4px_0_var(--accent-orange)] p-6 w-full max-w-sm animate-fade-up z-10 text-center">
        
        <div class="w-12 h-12 rounded-full bg-[var(--bg-creme)] border-[1.5px] border-[var(--accent-orange)] flex items-center justify-center mx-auto mb-4 text-[var(--accent-orange)]">
            <i class="fa-solid fa-circle-question text-xl"></i>
        </div>

        <h3 class="font-abril text-xl text-[var(--primary-green)] mb-2">Confirmation requise</h3>
        
        <p class="font-dm text-sm text-[var(--text-secondary)] mb-6 px-2">
            Êtes-vous sûr de vouloir effectuer cette action ?
        </p>
        
        <div class="flex items-center gap-3">
            <button (click)="onCancel()" class="flex-1 btn-secondary text-center">
                Non
            </button>
            <button (click)="onConfirm()" class="flex-1 btn-primary text-center">
                Oui
            </button>
        </div>
    </div>
</div>
