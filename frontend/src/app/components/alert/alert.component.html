<div class="fixed inset-0 z-[100] flex items-center justify-center bg-[var(--primary-green)]/90 backdrop-blur-sm p-4 animate-fade-in text-left">
    
    <div class="bg-[var(--white-cards)] rounded-[8px] border-[1.5px] border-[var(--border-light)] shadow-[4px_4px_0_var(--accent-orange)] p-8 max-w-md w-full animate-fade-up">
        
        <h3 class="font-abril text-2xl text-center text-[var(--primary-green)] mb-8 leading-snug">
            {{ message }}
        </h3>

        <div class="flex flex-col-reverse sm:flex-row justify-center gap-3">
            <button (click)="onAnnuler()" class="flex-1 btn-secondary">
                {{ texteBoutonAnnuler }}
            </button>
            
            <button (click)="onValider()" class="flex-1 btn-primary !bg-red-600 !border-red-600 hover:!bg-red-700">
                {{ texteBoutonValider }}
            </button>
        </div>

    </div>
</div>
