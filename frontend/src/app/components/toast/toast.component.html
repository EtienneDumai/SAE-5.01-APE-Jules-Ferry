<!--
Fichier : frontend/src/app/components/toast/toast.component.html
Auteur : cf ~/docs/general/participants.md
Description : Ce fichier contient le template du composant toast.
-->

@if (toast(); as toast) {
    <div class="fixed bottom-6 right-6 z-[100] w-fit max-w-sm animate-fade-up">
        
        <div class="flex items-center gap-4 px-5 py-4 rounded-[4px] border-[1.5px] shadow-[4px_4px_0_var(--primary-green)]"
             [class.bg-[#FFF5F5]]="toast.type === 'error'"
             [class.border-red-500]="toast.type === 'error'"
             [class.text-red-800]="toast.type === 'error'"
             [class.bg-[var(--bg-creme)]]="toast.type !== 'error'"
             [class.border-[var(--primary-green)]]="toast.type !== 'error'"
             [class.text-[var(--primary-green)]]="toast.type !== 'error'">
            
            @if (toast.type === 'error') {
                <i class="fa-solid fa-circle-exclamation text-lg"></i>
            } @else {
                <i class="fa-regular fa-circle-check text-lg text-[var(--accent-orange)]"></i>
            }

            <p class="font-dm text-sm font-medium leading-snug flex-1">{{ toast.message }}</p>
            
            <button class="text-current opacity-50 hover:opacity-100 transition-opacity" (click)="close()">
                <i class="fa-solid fa-xmark text-lg"></i>
            </button>
        </div>

    </div>
}
