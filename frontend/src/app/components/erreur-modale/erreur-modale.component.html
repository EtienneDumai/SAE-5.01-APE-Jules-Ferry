<div class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50" (click)="fermer()">
    <div class="bg-white rounded-lg shadow-xl max-w-md w-full mx-4" (click)="$event.stopPropagation()">
        <div class="flex items-center justify-between p-4 border-b">
            <h2 class="text-xl font-semibold text-gray-800">Erreur</h2>
            <button class="text-gray-500 hover:text-gray-700 text-2xl font-bold" (click)="fermer()">&times;</button>
        </div>
        <div class="p-6">
            <p class="text-gray-700">{{ messageErreur }}</p>
        </div>
        <div class="flex justify-end p-4 border-t">
            <button class="bg-blue-500 hover:bg-blue-600 text-white font-medium px-6 py-2 rounded" (click)="fermer()">OK</button>
        </div>
    </div>
</div>
