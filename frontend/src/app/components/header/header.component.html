<header class="sticky top-0 z-50 bg-[var(--primary-light-blue)] text-gray-800 shadow-sm">
  
  <div class="relative mx-auto w-full max-w-7xl px-4 py-3 flex items-center justify-between">

    <div class="flex items-center gap-4">
      
      <button 
        type="button"
        class="lg:hidden p-2 text-[var(--black-text-color)] hover:bg-white/50 rounded transition-colors"
        (click)="toggleMenu()"
        aria-label="Ouvrir le menu"
      >
        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      </button>

      <a routerLink="/" class="flex-shrink-0">
        <img src="/logo/logo.webp" alt="Logo APE" class="h-10 w-auto md:h-12" />
      </a>

      <nav class="hidden lg:flex items-center gap-6 ml-6">
        <a routerLink="/actualites" class="text-[var(--black-text-color)]" routerLinkActive="font-bold underline underline-offset-4 text-[var(--black-text-color)]">Actualités</a>
        <a routerLink="/evenements" class="text-[var(--black-text-color)]" routerLinkActive="font-bold underline underline-offset-4 text-[var(--black-text-color)]">Événements</a>
        <a routerLink="/newsletter" class="text-[var(--black-text-color)]" routerLinkActive="font-bold underline underline-offset-4 text-[var(--black-text-color)]">Newsletter</a>
        <a routerLink="/contact" class="text-[var(--black-text-color)]" routerLinkActive="font-bold underline underline-offset-4 text-[var(--black-text-color)]">Contact</a>
      </nav>
    </div>

    <div class="flex items-center gap-3">
      @if (!isAuthenticated) {
        <button routerLink="/login" class="bg-white text-[var(--primary-blue)] border border-[var(--primary-blue)] font-bold py-1.5 px-4 rounded-full text-sm hover:bg-blue-50 transition-colors">
          Connexion
        </button>
      }
      @if(isAuthenticated && currentUser) {
         <span class="hidden md:inline text-sm font-medium mr-2 text-gray-700">
           {{ currentUser.prenom }}
         </span>
         <button (click)="logout()" class="p-2 text-white bg-red-500 hover:bg-red-600 rounded-full shadow-sm transition-colors" title="Déconnexion">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
            </svg>
         </button>
      }
    </div>
  </div>

  @if (menuOpen) {
    <div class="fixed inset-0 z-40 bg-black/40 backdrop-blur-sm lg:hidden" (click)="closeMenu()"></div>

    <aside class="fixed top-0 left-0 z-50 h-full w-72 bg-[var(--primary-light-blue)] text-gray-800 shadow-2xl flex flex-col lg:hidden transform transition-transform">
      
      <div class="flex items-center justify-between p-4 border-b border-gray-100 bg-[var(--primary-light-blue)]">
        <span class="font-bold text-lg text-[var(--black-text-color)]">Menu</span>
        
        <button 
          type="button" 
          class="p-2 text-gray-600 hover:bg-red-50 hover:text-red-500 rounded-full transition-colors" 
          (click)="closeMenu()" 
          aria-label="Fermer"
        >
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>

      <nav class="flex-1 overflow-y-auto p-4 space-y-2">
        <a routerLink="/actualites" (click)="closeMenu()" routerLinkActive="bg-blue-50 text-[var(--black-text-color)] font-bold border-l-4 border-[var(--primary-blue)]" class="block px-4 py-3 rounded-r-lg hover:bg-gray-50 transition-all">Actualités</a>
        <a routerLink="/evenements" (click)="closeMenu()" routerLinkActive="bg-blue-50 text-[var(--black-text-color)] font-bold border-l-4 border-[var(--primary-blue)]" class="block px-4 py-3 rounded-r-lg hover:bg-gray-50 transition-all">Événements</a>
        <a routerLink="/newsletter" (click)="closeMenu()" routerLinkActive="bg-blue-50 text-[var(--black-text-color)] font-bold border-l-4 border-[var(--primary-blue)]" class="block px-4 py-3 rounded-r-lg hover:bg-gray-50 transition-all">Newsletter</a>
        <a routerLink="/contact" (click)="closeMenu()" routerLinkActive="bg-blue-50 text-[var(--black-text-color)] font-bold border-l-4 border-[var(--primary-blue)]" class="block px-4 py-3 rounded-r-lg hover:bg-gray-50 transition-all">Contact</a>
      </nav>
      
    </aside>
  }
</header>
