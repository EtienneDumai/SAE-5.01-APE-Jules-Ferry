<div class="min-h-screen flex items-center justify-center bg-[var(--primary-green)] px-4 relative overflow-hidden"
     style="background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(245, 240, 232, 0.02) 10px, rgba(245, 240, 232, 0.02) 20px);">
    
    <div class="relative z-10 bg-[var(--white-cards)] rounded-[8px] border-[1.5px] border-[var(--border-light)] shadow-[4px_4px_0_var(--accent-orange)] p-8 w-full max-w-md text-center animate-fade-up">
      
      <h2 class="font-abril text-3xl text-[var(--primary-green)] mb-6 flex justify-center items-center gap-3">
        <i class="fa-regular fa-compass text-[var(--accent-orange)]"></i> Espace Parent
      </h2>
      
      @if (!erreur) {
        <div class="bg-[var(--bg-creme)] border-[1.5px] border-[var(--border-light)] text-[var(--primary-green)] px-4 py-6 rounded-[4px] flex flex-col items-center justify-center gap-3">
          <i class="fa-solid fa-spinner fa-spin text-2xl text-[var(--accent-orange)]"></i> 
          <span class="font-josefin text-[11px] uppercase tracking-widest font-bold">{{ message }}</span>
        </div>
      }
  
      @if (erreur) {
        <div class="bg-[#FFF5F5] border-[1.5px] border-red-200 text-red-800 px-4 py-6 rounded-[4px] flex flex-col items-center">
          <i class="fa-regular fa-circle-xmark text-3xl mb-3 text-red-600"></i>
          <span class="font-dm text-sm font-medium mb-6">{{ message }}</span>
          
          <button class="w-full btn-secondary !border-red-200 !text-red-700 hover:!bg-red-50" routerLink="/login">
            Retour à la connexion
          </button>
        </div>
      }
  
    </div>
</div>
