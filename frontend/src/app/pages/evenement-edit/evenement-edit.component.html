<div class="max-w-3xl mx-auto px-4 py-8">
  <div class="mb-6 flex items-center justify-between">
    <h1 class="text-2xl font-bold text-gray-900">
      {{ isEditMode ? 'Modifier l\'événement' : 'Créer un nouvel événement' }}
    </h1>
    <a (click)="goBack()" class="text-gray-600 hover:text-blue-600 transition-colors" style="cursor:pointer">
      Annuler
    </a>
  </div>

  @if (loading) {
    <div class="flex justify-center items-center h-64">
      <app-spinner></app-spinner>
    </div>
  } @else {
    <form [formGroup]="evenementForm" (ngSubmit)="onSubmit()" class="bg-white rounded-2xl shadow-lg p-8 border border-gray-100">
      <div class="grid grid-cols-1 gap-6">
        
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Titre</label>
          <input type="text" formControlName="titre" 
                 class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
          <textarea formControlName="description" rows="4"
                    class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"></textarea>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Date</label>
            <input type="date" formControlName="date_evenement"
                   class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Heure début</label>
            <input type="time" formControlName="heure_debut"
                   class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Heure fin</label>
            <input type="time" formControlName="heure_fin"
                   class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Lieu</label>
          <input type="text" formControlName="lieu"
                 class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">URL de l'image (optionnel)</label>
          <input type="text" formControlName="image_url"
                 class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
        </div>

        <div class="pt-4">
          <button type="submit" [disabled]="evenementForm.invalid || saving"
                  class="w-full bg-blue-600 text-white font-bold py-3 px-6 rounded-xl hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed transition-all shadow-md active:scale-95">
            {{ saving ? 'Enregistrement...' : 'Enregistrer' }}
          </button>
        </div>

      </div>
    </form>
  }
</div>
