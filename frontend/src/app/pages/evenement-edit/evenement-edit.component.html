<div class="max-w-3xl mx-auto px-4 py-8">
  <div class="mb-6 flex items-center justify-between">
    <h1 class="text-2xl font-bold text-gray-900">
      {{ isEditMode ? 'Modifier l\'événement' : 'Créer un nouvel événement' }}
    </h1>
    <button type="button" (click)="goBack()" class="text-gray-600 hover:text-blue-600 transition-colors bg-transparent border-0 p-0" style="cursor:pointer">
      Annuler
    </button>
  </div>

  @if (loading) {
    <div class="flex justify-center items-center h-64">
      <app-spinner></app-spinner>
    </div>
  } @else {
    <form [formGroup]="evenementForm" (ngSubmit)="onSubmit()" class="bg-white rounded-2xl shadow-lg p-8 border border-gray-100">
      <div class="grid grid-cols-1 gap-6">
        
        <div>
          <label for="titre" class="block text-sm font-medium text-gray-700 mb-1">Titre</label>
          <input id="titre" type="text" formControlName="titre" 
                 class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
        </div>

        <div>
          <label for="description" class="block text-sm font-medium text-gray-700 mb-1">Description</label>
          <textarea id="description" formControlName="description" rows="4"
                    class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"></textarea>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div>
            <label for="date_evenement" class="block text-sm font-medium text-gray-700 mb-1">Date</label>
            <input id="date_evenement" type="date" formControlName="date_evenement"
                   class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
          </div>
          <div>
            <label for="heure_debut" class="block text-sm font-medium text-gray-700 mb-1">Heure début</label>
            <input id="heure_debut" type="time" formControlName="heure_debut"
                   class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
          </div>
          <div>
            <label for="heure_fin" class="block text-sm font-medium text-gray-700 mb-1">Heure fin</label>
            <input id="heure_fin" type="time" formControlName="heure_fin"
                   class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
          </div>
        </div>

        <div>
          <label for="lieu" class="block text-sm font-medium text-gray-700 mb-1">Lieu</label>
          <input id="lieu" type="text" formControlName="lieu"
                 class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
        </div>

        <div>
          <label for="image" class="block text-sm font-medium text-gray-700 mb-1">Image</label>
          <input id="image" type="file" accept="image/*" (change)="onImageFileChange($event)"
                 class="w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
          <div *ngIf="imageError" class="text-red-500 text-sm mt-2">{{ imageError }}</div>
        </div>

        <div class="pt-4">
          <button type="submit" [disabled]="evenementForm.invalid || saving"
                  class="w-full bg-blue-600 text-white font-bold py-3 px-6 rounded-xl hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed transition-all shadow-md active:scale-95">
            {{ saving ? 'Enregistrement...' : 'Enregistrer' }}
          </button>
        </div>

      </div>
    </form>
  }
</div>
