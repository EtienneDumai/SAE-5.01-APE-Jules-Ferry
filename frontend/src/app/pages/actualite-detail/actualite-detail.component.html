@if(this.loadingActualite){
    <div class="flex justify-center items-center h-64">
        <app-spinner></app-spinner>
    </div>

} @else if (this.errorActualite) {
<app-erreur-modale [messageErreur]="'Une erreur est survenue lors de la demande d\'accès à cette actualité'"></app-erreur-modale>

} @else {
    <div class="max-w-4xl mx-auto px-4 py-8">
        
        <button (click)="goBack()" class="mb-6 flex items-center text-gray-600 hover:text-[var(--primary-blue)] transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 mr-2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
            </svg>
            Retour aux actualités
        </button>

        <article class="bg-white rounded-2xl shadow-lg overflow-hidden">
            
            <div class="h-64 md:h-96 w-full relative overflow-hidden bg-gray-100">
                @if(actualite.image_url) {
                    <img [src]="actualite.image_url" [alt]="actualite.titre" class="w-full h-full object-cover">
                } @else {
                    <div class="flex items-center justify-center h-full text-gray-400">
                        <span class="text-lg italic">Aucune image disponible</span>
                    </div>
                }
            </div>

            <div class="p-8 md:p-12">
                <div class="flex flex-wrap gap-4 text-sm text-gray-500 mb-6 items-center">
                    
                    <div class="flex items-center">
                        <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        {{ convertDateToString(actualite.date_publication) }}
                    </div>

                    <!-- @if(actualite.statut === 'brouillon') {
                        <span class="bg-yellow-100 text-yellow-800 text-xs font-medium px-2.5 py-0.5 rounded">Brouillon</span>
                    } -->
                </div>

                <h1 class="text-3xl md:text-4xl font-bold text-gray-900 mb-8 leading-tight">
                    {{ actualite.titre }}
                </h1>

                <div class="prose max-w-none text-gray-700 text-lg leading-relaxed whitespace-pre-line">
                    {{ actualite.contenu }}
                </div>

                <div class="mt-12 pt-6 border-t border-gray-100 flex items-center">
                   <div class="bg-blue-100 rounded-full p-3 mr-4">
                        <svg class="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                   </div>
                   <div>
                       <p class="text-sm text-gray-500">Publié par</p>
                       <!-- récup l'id auteur pour avoir l'auteur -->
                   </div>
                </div>

            </div>
        </article>
    </div>
}
