services:
  postgres:
    image: postgres:16
    container_name: app_postgres_prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: app_db
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: app_password
    volumes:
      - postgres_data:/var/lib/postgresql/data

  laravel:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: app_laravel
    restart: unless-stopped
    env_file:
      - ./backend/.env.prod
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: app_db
      DB_USERNAME: app_user
      DB_PASSWORD: app_password
    depends_on:
      - postgres
    volumes:
      - laravel_storage:/var/www/html/storage
      - laravel_cache:/var/www/html/bootstrap/cache

  angular_build:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: app_angular_build
    restart: unless-stopped
    volumes:
      - angular_dist:/output/dist

  nginx_laravel:
    image: nginx:alpine
    container_name: app_nginx_laravel
    restart: unless-stopped
    depends_on:
      - laravel
    volumes:
      - ./nginx/laravel.conf:/etc/nginx/conf.d/default.conf:ro

  nginx_front:
    image: nginx:alpine
    container_name: app_nginx_front
    restart: unless-stopped
    depends_on:
      - nginx_laravel
      - angular_build
    ports:
      - "80:80"
    volumes:
      - ./nginx/front.conf:/etc/nginx/conf.d/default.conf:ro
      - angular_dist:/usr/share/nginx/html:ro

volumes:
  postgres_data:
  laravel_storage:
  laravel_cache:
  angular_dist:
